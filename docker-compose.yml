services:
  frontend:
    build: ./frontend
    deploy:
      replicas: 2
    ports:
      - "3000:3000"

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - db

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: practical_db
    ports:
      - "3306:3306"
